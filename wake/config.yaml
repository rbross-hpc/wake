models:
  describe: "Claude Sonnet 4.6"
  classify: "Claude Sonnet 4.6"
  pdf_abstract_extract: "Claude Sonnet 4.6"

openalex:
  rate_limit_s: 1.0
  per_page: 200
  mailto_default: "rross@anl.gov"

# Lazy abstract backfill: when a citing work selected for classification has
# no OpenAlex abstract, try these sources in order before falling back to
# title+venue-only classification. Tried once per citing work; result is
# cached in the classify sidecar (abstract_source field) so it's never
# re-fetched. OSTI first (free, no rate limit, high precision but DOE-only
# coverage); Semantic Scholar second (unauthenticated, ~100 req/5min,
# broader coverage). Both return None quickly on a miss.
abstract_backfill:
  enabled: true
  sources: [osti, semanticscholar]
  rate_limit_s:
    osti: 0.5
    semanticscholar: 1.2

# Human-driven escalation for high-value citing works that automatic
# backfill (OSTI/Semantic Scholar) couldn't recover an abstract for. See
# `wake gaps` (surface candidates) and `wake fill-abstract` (resolve one).
gaps:
  # A no-abstract work is worth surfacing to the human if its own
  # cited_by_count is at least this — below the threshold, title+venue-only
  # classification is judged good enough and not worth the escalation.
  min_cited_by_count: 20
  default_limit: 10

pdf_extract:
  max_pages: 3
  prompt_version: "pdf-abstract-1"

# PDF acquisition chain (wake fetch-pdf): tried in order, all API-based
# (no scraping publisher landing pages, no sci-hub-style sources). OSTI
# first (DOE-funded work, direct PDF, no auth wall); Semantic Scholar and
# Unpaywall next (broader OA aggregation, some URLs 403 bot downloads);
# arXiv for preprints; CORE last and optional (needs CORE_API_KEY, silently
# skipped if unset). On full failure, returns human-actionable links
# instead (Unpaywall lookup page, Google Scholar search, publisher DOI,
# CORE search).
pdf_fetch:
  sources: [osti, semanticscholar, unpaywall, arxiv, core]
  rate_limit_s:
    osti: 0.5
    semanticscholar: 1.2
    unpaywall: 0.5
    arxiv: 3.0
    core: 1.0
  download_timeout_s: 30
  # A downloaded file below this size is treated as a failed fetch (e.g. an
  # HTML error/paywall page saved with a .pdf extension) rather than a
  # genuine PDF.
  min_valid_pdf_bytes: 2048

classify:
  prompt_version: "classify-2"
  relationships:
    - extends
    - builds-on
    - uses-as-tool
    - benchmarks
    - applies-to-domain
    - related-infrastructure
    - background-mention

describe:
  prompt_version: "describe-1"

report:
  top_evidence_n: 20
  high_cited_threshold: 50

# Estimate-only cost telemetry. Rates are $/1K tokens; models without an
# entry here report cost_usd_est=0.0 and are flagged unpriced=true rather
# than silently guessing. Add real rates here as they become known.
cost:
  rates_per_1k_usd: {}
